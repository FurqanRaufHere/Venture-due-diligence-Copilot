services:
  - type: web
    name: ai-vdd-copilot
    env: python
    plan: free
    healthCheckPath: /health

    buildCommand: >
      pip install fastapi uvicorn python-multipart pypdf pdfplumber pandas
      openpyxl python-dotenv "sqlalchemy>=2.0.36" pydantic httpx groq
      sentence-transformers faiss-cpu reportlab numpy psycopg2-binary

    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: REPORTS_DIR
        value: /tmp/reports