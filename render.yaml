services:
  - type: web
    name: ai-vdd-copilot
    env: python
    plan: free
    healthCheckPath: /health

    buildCommand: pip install -r requirements-backend.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: REPORTS_DIR
        value: /tmp/reports
      - key: PRELOAD_FAISS_ON_STARTUP
        value: "false"
      - key: FRONTEND_ORIGIN_REGEX
        value: https://.*\.onrender\.com

  - type: static
    name: ai-vdd-frontend
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html